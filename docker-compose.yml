version: '3.8'

services:
  # 数据库服务（使用 pgvector 镜像，预装向量扩展）
  db:
    image: pgvector/pgvector:pg15
    container_name: codesage-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codesage}
    volumes:
      # --- Windows 开发环境测试路径 (相对路径) ---
      - ./data/postgres:/var/lib/postgresql/data
      # --- 启动时自动创建 pgvector 扩展 ---
      - ./docker_data/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codesage}"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 缓存服务：JWT 令牌黑名单 / 刷新令牌 / 登录限流
  redis:
    image: redis:7-alpine
    container_name: codesage-redis
    restart: always
    # 使用挂载进来的自定义配置文件启动
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      # 配置文件挂载（只读，避免容器内误改）
      - ./docker_data/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      # 持久化数据目录挂载（RDB + AOF 落盘）
      - ./docker_data/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 对象存储服务：用户头像等文件资源（S3 兼容）
  minio:
    image: minio/minio:latest
    container_name: codesage-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-codesage_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-codesage_minio_change_me_32_chars}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-codesage-key:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    volumes:
      - ./docker_data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: codesage-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-codesage_minio} ${MINIO_ROOT_PASSWORD:-codesage_minio_change_me_32_chars} &&
      mc mb -p local/${S3_BUCKET_AVATARS:-codesage-avatars} &&
      mc anonymous set download local/${S3_BUCKET_AVATARS:-codesage-avatars} &&
      mc encrypt set sse-s3 local/${S3_BUCKET_AVATARS:-codesage-avatars}
      "
    restart: "no"

  # 后端服务 (FastAPI)
  backend:
    build: ./backend
    container_name: codesage-backend
    restart: always
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-codesage}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_DAYS=${ACCESS_TOKEN_EXPIRE_DAYS:-7}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - VERIFY_EMAIL_BASE_URL=${VERIFY_EMAIL_BASE_URL:-http://localhost:80}
      # LightRAG 系统级配置（AI 模型供应商配置已迁移至数据库 ai_providers 表，
      # 通过前端「设置 → 模型供应商」页面管理，无需在此配置 LLM 相关项）
      - LIGHTRAG_ENABLED=${LIGHTRAG_ENABLED:-true}
      - LIGHTRAG_WORKING_DIR=${LIGHTRAG_WORKING_DIR:-data/lightrag}
      # LightRAG Postgres 存储后端配置（与项目数据库共用）
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=${POSTGRES_DB:-codesage}
      - POSTGRES_WORKSPACE=codesage_rag
      # 登录安全
      - LOGIN_MAX_FAIL_ATTEMPTS=${LOGIN_MAX_FAIL_ATTEMPTS:-5}
      - LOGIN_LOCK_MINUTES=${LOGIN_LOCK_MINUTES:-15}
      - EMAIL_VERIFY_EXPIRE_HOURS=${EMAIL_VERIFY_EXPIRE_HOURS:-24}
      - SKIP_EMAIL_VERIFICATION=${SKIP_EMAIL_VERIFICATION:-false}
      - S3_ENABLED=${S3_ENABLED:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-http://localhost:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-codesage_minio}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-codesage_minio_change_me_32_chars}
      - S3_BUCKET_AVATARS=${S3_BUCKET_AVATARS:-codesage-avatars}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_USE_SSL=${S3_USE_SSL:-false}
    volumes:
      # --- 开发环境代码挂载 (实现修改代码后容器内自动热重载) ---
      - ./backend:/app/backend
      # --- LightRAG 本地索引和图谱数据（Postgres 存储后作为缓存/日志） ---
      - ./docker_data/lightrag:/app/data/lightrag
    # 覆盖 Dockerfile 中的 CMD，增加 --reload 模式方便开发
    command: python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  # 前端服务 (Vue 3 + Nginx)
  frontend:
    build: ./frontend
    container_name: codesage-frontend
    restart: always
    # volumes:
    #   # --- 如果您想在容器外直接看到构建后的文件，可以取消下面注释 ---
    #   - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend

# 命名卷定义
volumes:
  pgdata:
