version: '3.8'

services:
  # 数据库服务
  db:
    image: postgres:15-alpine
    container_name: codesage-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-chatgpt_clone}
    volumes:
      # --- Windows 开发环境测试路径 (相对路径) ---
      - ./data/postgres:/var/lib/postgresql/data

      # --- Linux 生产环境路径 (如果需要请切换到下面这行) ---
      # - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 缓存服务：JWT 令牌黑名单 / 刷新令牌 / 登录限流
  redis:
    image: redis:7-alpine
    container_name: codesage-redis
    restart: always
    # 使用挂载进来的自定义配置文件启动
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      # 配置文件挂载（只读，避免容器内误改）
      - ./docker_data/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      # 持久化数据目录挂载（RDB + AOF 落盘）
      - ./docker_data/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 后端服务 (FastAPI)
  backend:
    build: ./backend
    container_name: codesage-backend
    restart: always
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-chatgpt_clone}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_DAYS=${ACCESS_TOKEN_EXPIRE_DAYS:-7}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - VERIFY_EMAIL_BASE_URL=${VERIFY_EMAIL_BASE_URL:-http://localhost:80}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LIGHTRAG_ENABLED=${LIGHTRAG_ENABLED:-true}
      - LIGHTRAG_WORKING_DIR=${LIGHTRAG_WORKING_DIR:-data/lightrag}
    volumes:
      # --- 开发环境代码挂载 (实现修改代码后容器内自动热重载) ---
      - ./backend:/app/backend
      # --- LightRAG 本地索引和图谱数据 ---
      - ./docker_data/lightrag:/app/data/lightrag
    # 覆盖 Dockerfile 中的 CMD，增加 --reload 模式方便开发
    command: python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # 前端服务 (Vue 3 + Nginx)
  frontend:
    build: ./frontend
    container_name: codesage-frontend
    restart: always
    # volumes:
    #   # --- 如果您想在容器外直接看到构建后的文件，可以取消下面注释 ---
    #   - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend

# 命名卷定义
volumes:
  pgdata:
