# ===================================================================
# CodeSage Redis 配置文件
# 用途：JWT 令牌黑名单、刷新令牌管理、登录限流缓存
# 挂载：docker_data/redis/redis.conf -> /usr/local/etc/redis/redis.conf
# ===================================================================

# --- 网络与基础 ---
# 监听所有网卡，允许容器内外访问
bind 0.0.0.0
# 默认端口
port 6379
# 保护模式关闭（开发环境；生产应配合 bind 与 requirepass）
protected-mode no
# TCP keepalive，及时清理死连接
tcp-keepalive 300
# 空闲超时秒数（0=不超时）
timeout 0

# --- 通用 ---
# 后台运行关闭（容器前台进程必须非 daemon）
daemonize no
# 进程归属
supervised no
# 日志级别：debug/verbose/notice/warning
loglevel notice
# 日志输出到标准输出（docker logs 可见）
logfile ""
# 数据库数量
databases 16

# --- 内存与淘汰策略 ---
# 最大内存：256MB（按需调整）
maxmemory 256mb
# 内存满时淘汰策略：LRU 过期键优先，其次任意键
maxmemory-policy allkeys-lru

# --- 持久化：RDB 快照 ---
# 挂载目录 docker_data/redis/data -> /data
dir /data
# 快照策略：3600s 内 1 次写、300s 内 100 次写、60s 内 10000 次写
save 3600 1
save 300 100
save 60 10000
# RDB 文件名与压缩
dbfilename dump.rdb
rdbcompression yes
rdbchecksum yes

# --- 持久化：AOF 追加日志（更强数据安全，符合生产要求）---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- 慢查询日志 ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- 安全（生产建议取消注释并设置强密码）---
# requirepass your_strong_password_here

# --- 客户端缓冲区上限，防止大 key 拖垮服务 ---
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
