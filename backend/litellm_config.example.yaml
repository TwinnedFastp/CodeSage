# LiteLLM Proxy 示例配置
#
# 用途：
# 1. 把不同厂商的大模型统一成 OpenAI 兼容接口。
# 2. 后端只需要把 LLM_BASE_URL 指向 LiteLLM Proxy，就能切换模型。
#
# 启动示例：
#   litellm --config backend/litellm_config.example.yaml --port 4000
#
# 然后在 .env 中配置：
#   LLM_BASE_URL=http://localhost:4000/v1
#   LLM_API_KEY=sk-anything
#   LLM_MODEL=qwen-plus

model_list:
  # 阿里百炼 / DashScope
  - model_name: qwen-plus
    litellm_params:
      model: dashscope/qwen-plus
      api_key: os.environ/DASHSCOPE_API_KEY

  # 阿里百炼 Embedding。LightRAG 写入知识库时会调用它生成向量。
  - model_name: text-embedding-v4
    litellm_params:
      model: dashscope/text-embedding-v4
      api_key: os.environ/DASHSCOPE_API_KEY

  # DeepSeek 示例。使用前需要配置 DEEPSEEK_API_KEY。
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # OpenAI 示例。使用前需要配置 OPENAI_API_KEY。
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  # LiteLLM Proxy 自己的鉴权 key。
  # 开发学习时可以先用 sk-anything；生产环境请换成强随机字符串。
  master_key: sk-anything
